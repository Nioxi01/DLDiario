<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="D. Leiton">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>Diego Leiton — Plan y Entreno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --black: #0d0d0d; --charcoal: #161616; --line: #333333;
  --bone: #ededeb; --bone-dim: #9a9890; --bone-faint: #5e5c57;
  --acid: #d4ff3d;
  --font-display: 'Archivo Black', sans-serif; --font-mono: 'JetBrains Mono', monospace;
}
html, body { height: 100%; overflow: hidden; background: var(--black); }
body { font-family: var(--font-mono); color: var(--bone); display: flex; flex-direction: column; }

/* Splash / loading state */
#splash {
  position: fixed; inset: 0; background: var(--black); z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.4s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }
.splash-mark { width: 64px; height: 64px; background: var(--acid); display: flex; align-items: center; justify-content: center; transform: rotate(-8deg); animation: pulse-mark 1.6s ease-in-out infinite; }
.splash-mark span { font-family: var(--font-display); color: var(--black); font-size: 30px; }
@keyframes pulse-mark { 0%,100%{transform:rotate(-8deg) scale(1);} 50%{transform:rotate(-8deg) scale(1.06);} }
.splash-label { font-family: var(--font-mono); font-size: 11px; color: var(--bone-faint); text-transform: uppercase; letter-spacing: 0.15em; }

/* Top bar */
.topbar { flex: none; display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--charcoal); border-bottom: 1px solid var(--line); padding-top: calc(10px + env(safe-area-inset-top)); }
.topbar-brand { display: flex; align-items: center; gap: 8px; }
.topbar-mark { width: 24px; height: 24px; background: var(--acid); display: flex; align-items: center; justify-content: center; transform: rotate(-6deg); flex-shrink: 0; }
.topbar-mark span { font-family: var(--font-display); color: var(--black); font-size: 11px; }
.topbar-title { font-family: var(--font-mono); font-size: 11px; color: var(--bone-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.topbar-status { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--bone-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acid); }
.status-dot.offline { background: var(--bone-faint); }

/* Content area */
.content { flex: 1; position: relative; overflow: hidden; }
.module-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; opacity: 0; visibility: hidden; transition: opacity 0.2s ease; background: var(--black); }
.module-frame.active { opacity: 1; visibility: visible; }

/* Bottom tab bar */
.tabbar { flex: none; display: flex; background: var(--charcoal); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 8px; background: none; border: none; cursor: pointer; color: var(--bone-faint); transition: color 0.15s; }
.tab-btn.active { color: var(--acid); }
.tab-icon { width: 22px; height: 22px; }
.tab-icon svg { width: 100%; height: 100%; }
.tab-label { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; }
.tab-indicator { position: absolute; top: 0; height: 2px; background: var(--acid); transition: left 0.25s ease; width: 50%; left: 0; }
.tabbar-wrap { position: relative; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-mark"><span>D</span></div>
  <div class="splash-label">Cargando tu plan...</div>
</div>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-mark"><span>D</span></div>
    <span class="topbar-title" id="topbarTitle">Entrenamiento</span>
  </div>
  <div class="topbar-status">
    <span class="status-dot" id="connStatusDot"></span>
    <span id="connStatusText">Conectado</span>
  </div>
</div>

<div class="content">
  <iframe class="module-frame active" id="frameEntreno" src="entrenamiento.html"></iframe>
  <iframe class="module-frame" id="frameNutricion" src="nutricion.html"></iframe>
</div>

<div class="tabbar-wrap">
  <div class="tab-indicator" id="tabIndicator"></div>
  <div class="tabbar">
    <button class="tab-btn active" id="tabEntreno" onclick="switchModule('entreno')">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5M14 4l6 6M4 14l6 6M9 4 4 9M15 20l5-5"/></svg></span>
      <span class="tab-label">Entreno</span>
    </button>
    <button class="tab-btn" id="tabNutricion" onclick="switchModule('nutricion')">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2a9 9 0 0 0 0 18 9 9 0 0 0 0-18z"/><path d="M11 7v5l3 3"/><path d="M19 4l1.5 1.5M21 9h1"/></svg></span>
      <span class="tab-label">Nutrición</span>
    </button>
  </div>
</div>

<script>
// ============================================================
// MODULE SWITCHING
// ============================================================
const titles = { entreno: 'Entrenamiento', nutricion: 'Nutrición' };
function switchModule(name) {
  document.getElementById('frameEntreno').classList.toggle('active', name === 'entreno');
  document.getElementById('frameNutricion').classList.toggle('active', name === 'nutricion');
  document.getElementById('tabEntreno').classList.toggle('active', name === 'entreno');
  document.getElementById('tabNutricion').classList.toggle('active', name === 'nutricion');
  document.getElementById('tabIndicator').style.left = name === 'entreno' ? '0%' : '50%';
  document.getElementById('topbarTitle').textContent = titles[name];
  try { localStorage.setItem('diego_last_module', name); } catch(e) {}
}

// Restore last viewed module
try {
  const last = localStorage.getItem('diego_last_module');
  if (last === 'nutricion') switchModule('nutricion');
} catch(e) {}

// ============================================================
// CONNECTION STATUS
// ============================================================
function updateConnStatus() {
  const online = navigator.onLine;
  document.getElementById('connStatusDot').classList.toggle('offline', !online);
  document.getElementById('connStatusText').textContent = online ? 'Conectado' : 'Sin conexión';
}
window.addEventListener('online', updateConnStatus);
window.addEventListener('offline', updateConnStatus);
updateConnStatus();

// ============================================================
// SPLASH SCREEN
// ============================================================
let framesLoaded = 0;
function frameReady() {
  framesLoaded++;
  if (framesLoaded >= 1) {
    setTimeout(() => { document.getElementById('splash').classList.add('hidden'); }, 350);
  }
}
document.getElementById('frameEntreno').addEventListener('load', frameReady);
// Fallback in case load event doesn't fire reliably
setTimeout(() => { document.getElementById('splash').classList.add('hidden'); }, 2200);

// ============================================================
// SERVICE WORKER REGISTRATION
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
